name: Bug Report
description: Something isn't working as expected
labels: ["type:bug", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I can reproduce this consistently
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? Be specific.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call `GET /api/scrape?q=tv`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or stack traces if available.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API (route handlers)
        - Scraper (parsers, registry)
        - Platform (cache, queue, redis, http)
        - UI (frontend components)
        - Data / types
        - Ops / infra
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
