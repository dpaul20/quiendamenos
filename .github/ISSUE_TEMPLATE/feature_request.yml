name: Feature Request
description: Propose a new feature or improvement
labels: ["type:feature", "status:needs-review"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      description: What pain point does this address? Why does it matter?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work from the user's perspective?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API (route handlers)
        - Scraper (parsers, registry)
        - Platform (cache, queue, redis, http)
        - UI (frontend components)
        - Data / types
        - Ops / infra
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, examples, references, links.
